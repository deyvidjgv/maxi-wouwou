<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="refresh"
      content="0; url=login.html" />
    <title>Redirigiendo... - Maxi Guau Guau POS</title>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f8fafc;
        color: #64748b;
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 2s linear infinite;
        margin-right: 15px;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loader"></div>
    <p>
      Redirigiendo al sistema... si no carga, haz clic
      <a
        href="login.html"
        style="color: #3b82f6; text-decoration: none; font-weight: 600">
        aquí

      .
    </p>
  </body>
