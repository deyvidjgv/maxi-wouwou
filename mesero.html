<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Mesero - Maxi Guau Guau</title>
    <link
      rel="stylesheet"
      href="css/style.css" />
    <link
      rel="stylesheet"
      href="designinspo/variables.css" />
    <link
      rel="stylesheet"
      href="designinspo/layout.css" />
    <link
      rel="stylesheet"
      href="designinspo/components.css" />
    <link
      rel="stylesheet"
      href="designinspo/responsive.css" />
    <link
      rel="manifest"
      href="manifest.json" />

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet" />
  </head>
  <body>
    <div id="appBody">
      <aside
        class="sidebar"
        id="sidebar">
        <div class="sidebar-brand">
          <div class="brand-wrapper">
            <img
              src="https://img.icons8.com/ultraviolet/40/hamburger.png"
              style="width: 40px; height: 40px"
              alt="Logo" />
            <div class="brand-text">
              <span class="brand-maxi">Maxi</span>
              <span class="brand-wouwou">wou wou</span>
            </div>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button
            class="sidebar-btn sidebar-btn-new active"
            onclick="
              app.navegar('comanda');
              setActiveBtn(this);
            ">
            <i data-lucide="shopping-cart"></i>
            <span>Ventas</span>
          </button>
          <button
            class="sidebar-btn sidebar-btn-new"
            onclick="
              app.navegar('reportetotal');
              setActiveBtn(this);
            ">
            <i data-lucide="clipboard-list"></i>
            <span>Historial</span>
          </button>
          <button
            class="sidebar-btn sidebar-btn-new"
            onclick="
              app.navegar('pedidosweb');
              setActiveBtn(this);
            ">
            <i data-lucide="globe"></i>
            <span>Pedidos Web</span>
          </button>
        </nav>
        <div class="sidebar-footer">
          <small>v6.0.0 | Mesero</small>
        </div>
      </aside>

      <div
        class="sidebar-overlay"
        id="sidebarOverlay"
        onclick="toggleSidebar()"></div>

      <header>
        <div class="header-left">
          <button
            class="sidebar-toggle"
            onclick="toggleSidebar()">
            <span class="material-symbols-rounded">menu</span>
          </button>
          <div class="user-data">
            <span>Mesero</span>
            :
            <b id="txtUserEmail"></b>
          </div>
        </div>
        <button
          class="btn btn-secondary"
          onclick="app.cerrarSesion()">
          Cerrar Sesión
        </button>
      </header>

      <main>
        <!-- Vista Ventas / Mesas -->
        <div
          id="v-comanda"
          class="modulo">
          <div style="padding: 15px; text-align: center">
            <h2 style="margin: 0; font-size: 1.5rem">
              <i
                data-lucide="grid-3x3"
                style="vertical-align: middle; margin-right: 10px"></i>
              Gestión de Mesas
            </h2>
          </div>
          <div
            id="gridMesas"
            class="grid-mesas"></div>
        </div>

        <!-- Vista Historial de Ventas -->
        <div
          id="v-reportetotal"
          class="modulo"
          style="display: none">
          <div style="padding: 15px; text-align: center">
            <h2 style="margin: 0; font-size: 1.5rem">
              <i
                data-lucide="clipboard-list"
                style="
                  width: 32px;
                  height: 32px;
                  vertical-align: middle;
                  margin-right: 10px;
                "></i>
              Historial de Ventas
            </h2>
          </div>
          <div class="dashboard-card transactions-card">
            <div
              class="transactions-list"
              id="listaVentas"></div>
          </div>
        </div>

        <!-- Vista Pedidos Web -->
        <div
          id="v-pedidosweb"
          class="modulo"
          style="display: none">
          <div style="padding: 15px; text-align: center">
            <h2 style="margin: 0; font-size: 1.5rem">
              <i
                data-lucide="globe"
                style="
                  width: 32px;
                  height: 32px;
                  vertical-align: middle;
                  margin-right: 10px;
                "></i>
              Pedidos Web (Externos)
            </h2>
          </div>
          <div
            id="listaPedidosWeb"
            style="
              padding: 15px;
              display: grid;
              gap: 15px;
              grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            "></div>
        </div>
      </main>

      <!-- Modal Mesa -->
      <div
        id="modalMesa"
        class="modal"
        style="display: none">
        <!-- MODAL MESA COMPLETO IGUAL AL ORIGINAL -->
        <div class="modal-content modal-split">
          <!-- 1. PANEL MENÚ (Selección) -->
          <div class="section-panel panel-menu">
            <div id="categoriasView">
              <h3
                style="
                  color: var(--primary);
                  margin-top: 0;
                  margin-bottom: 20px;
                ">
                Menú
              </h3>
              <div class="grid-categorias-large">
                <button
                  onclick="app.abrirCategoria('hamburguesas')"
                  class="btn-categoria-large">
                  <img
                    src="https://img.icons8.com/ultraviolet/40/hamburger.png"
                    style="width: 48px; height: 48px"
                    alt="Hamburguesas" />
                  <span>Hamburguesas</span>
                </button>
                <button
                  onclick="app.abrirCategoria('perros')"
                  class="btn-categoria-large">
                  <img
                    src="https://img.icons8.com/ultraviolet/40/hot-dog.png"
                    style="width: 48px; height: 48px"
                    alt="Perros" />
                  <span>Perros Calientes</span>
                </button>
                <button
                  onclick="app.abrirCategoria('salchipapas')"
                  class="btn-categoria-large">
                  <img
                    src="https://img.icons8.com/external-icongeek26-outline-colour-icongeek26/64/external-stir-fry-mexican-food-icongeek26-outline-colour-icongeek26.png"
                    style="width: 48px; height: 48px"
                    alt="Salchipapas" />
                  <span>Salchipapas</span>
                </button>
                <button
                  onclick="app.abrirCategoria('bebidas')"
                  class="btn-categoria-large">
                  <img
                    src="https://img.icons8.com/pulsar-gradient/48/soda-water.png"
                    style="width: 48px; height: 48px"
                    alt="Bebidas" />
                  <span>Bebidas</span>
                </button>
              </div>
            </div>
            <div
              id="productosView"
              style="display: none">
              <button
                class="btn-volver"
                onclick="app.volverCategorias()">
                <span class="material-symbols-rounded">arrow_back</span>
                Atrás
              </button>
              <h3
                id="tituloCategoriaActual"
                style="
                  color: var(--primary);
                  margin-top: 15px;
                  margin-bottom: 20px;
                ">
                Productos
              </h3>
              <div
                id="listaItems"
                class="grid-productos"></div>
            </div>
          </div>

          <!-- 2. PANEL PEDIDO (Lo que hay en la mesa) -->
          <div class="section-panel panel-pedido">
            <h2
              id="mesaNum"
              style="margin-top: 0; font-size: 1.4rem; text-align: center"></h2>
            <div
              style="
                font-weight: 600;
                font-size: 0.9rem;
                margin-bottom: 10px;
                color: #64748b;
                border-bottom: 1px solid #e2e8f0;
                padding-bottom: 5px;
              ">
              Pedido Actual:
            </div>
            <div
              id="itemsCarrito"
              style="flex: 1; overflow-y: auto"></div>
          </div>

          <!-- 3. PANEL PAGO (Totales y Cobro) -->
          <div class="section-panel panel-pago">
            <div
              style="
                font-weight: 600;
                font-size: 0.9rem;
                margin-bottom: 15px;
                color: #64748b;
                border-bottom: 1px solid #e2e8f0;
                padding-bottom: 5px;
              ">
              Total y Pago:
            </div>

            <div
              class="llevar-box"
              style="margin-bottom: 10px">
              <label>Llevar ($1000):</label>
              <div style="display: flex; gap: 5px">
                <button
                  onclick="app.decrementarLlevar()"
                  style="
                    padding: 0 10px;
                    background: var(--primary);
                    color: white;
                  ">
                  -
                </button>
                <input
                  type="number"
                  id="cantLlevar"
                  value="0"
                  min="0"
                  style="width: 50px; padding: 5px; text-align: center"
                  onchange="app.actualizarTotal()" />
                <button
                  onclick="app.incrementarLlevar()"
                  style="
                    padding: 0 10px;
                    background: var(--primary);
                    color: white;
                  ">
                  +
                </button>
              </div>
            </div>

            <div class="propina-box">
              <label>Agregar Propina:</label>
              <div style="display: flex; gap: 5px">
                <button
                  class="btn-propina"
                  onclick="app.setPropina(0)">
                  0%
                </button>
                <button
                  class="btn-propina"
                  onclick="app.setPropina(0.1)">
                  10%
                </button>
                <button
                  class="btn-propina"
                  onclick="app.setPropinaMensaje()">
                  Monto
                </button>
              </div>
            </div>

            <div
              style="
                background: rgba(16, 185, 129, 0.05);
                border-radius: 10px;
                padding: 10px;
                margin-top: 10px;
                border: 1px solid rgba(16, 185, 129, 0.1);
              ">
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  font-size: 0.9rem;
                ">
                <span>Subtotal:</span>
                <span id="subtotalMesa">$0</span>
              </div>
              <div
                style="
                  display: flex;
                  justify-content: space-between;
                  color: #10b981;
                  font-size: 0.9rem;
                ">
                <span>Propina:</span>
                <span id="propinaMesa">$0</span>
              </div>
              <h3
                id="totalMesa"
                style="
                  margin: 8px 0 0 0;
                  font-size: 1.5rem;
                  color: var(--primary);
                  text-align: center;
                ">
                Total: $0
              </h3>
            </div>

            <select
              id="metodoPago"
              onchange="app.onPaymentMethodChange()"
              style="margin-top: 15px; width: 100%">
              <option value="">Pendiente (Cocina)</option>
              <option value="Efectivo">Efectivo</option>
              <option value="Transferencia">Transferencia</option>
              <option value="Mixto">Mixto</option>
            </select>

            <div
              id="paymentInputs"
              style="margin-top: 10px">
              <div
                id="efectivoBox"
                style="display: none; margin-top: 8px">
                <label>Recibido:</label>
                <input
                  type="number"
                  id="cashReceived"
                  min="0"
                  value="0"
                  style="width: 100%"
                  oninput="app.updateChange()" />
                <div
                  id="changeDisplay"
                  style="margin-top: 6px; font-weight: 600; color: #10b981">
                  Cambio: $0
                </div>
              </div>
              <div
                id="transferBox"
                style="display: none; margin-top: 8px">
                <label>Referencia:</label>
                <input
                  type="text"
                  id="transferRef"
                  placeholder="Referencia..."
                  style="width: 100%" />
                <label style="margin-top: 5px; display: block">Monto:</label>
                <input
                  type="number"
                  id="transferAmount"
                  min="0"
                  value="0"
                  style="width: 100%"
                  oninput="app.updateChange()" />
              </div>
              <div
                id="mixedBox"
                style="display: none; margin-top: 8px">
                <label>Monto transfer:</label>
                <input
                  type="number"
                  id="mixedTransferAmount"
                  min="0"
                  value="0"
                  style="width: 100%"
                  oninput="app.updateChange()" />
                <label style="margin-top: 5px; display: block">
                  Recibido efectivo:
                </label>
                <input
                  type="number"
                  id="mixedCashReceived"
                  min="0"
                  value="0"
                  style="width: 100%"
                  oninput="app.updateChange()" />
                <div
                  id="mixedChangeDisplay"
                  style="margin-top: 6px; font-weight: 600; color: #10b981">
                  Cambio: $0
                </div>
              </div>
            </div>

            <div
              style="
                display: flex;
                gap: 10px;
                margin-top: auto;
                padding-top: 20px;
              ">
              <button
                class="btn-cancelar"
                style="flex: 1"
                onclick="app.cerrarMesa()">
                Cerrar
              </button>
              <button
                class="btn-confirmar"
                style="flex: 2"
                onclick="app.guardarPedido()">
                Guardar / Pagar
              </button>
            </div>
          </div>
        </div>
      </div>

      <footer
        style="
          padding: 40px 20px;
          text-align: center;
          color: #94a3b8;
          font-size: 0.75rem;
        ">
        <p>
          Desarrollado por:
          <strong>Deyvid Javier Godoy V.</strong>
        </p>
        <span>v6.0.0 | Mesero</span>
      </footer>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/app.js"></script>
    <script>
      // Protección de ruta para Mesero
      firebase.auth().onAuthStateChanged((user) => {
        if (!user) {
          window.location.href = 'login.html';
        } else {
          // Validar rol en Firestore
          firebase
            .firestore()
            .collection('users')
            .doc(user.uid)
            .get()
            .then((doc) => {
              if (doc.exists && doc.data().rol === 'mesero') {
                // El mesero puede estar aquí
                app.navegar('comanda'); // Iniciar en ventas
              } else {
                window.location.href = 'login.html';
              }
            });
        }
      });

      lucide.createIcons();
      function toggleSidebar() {
        var sb = document.getElementById('sidebar');
        if (window.innerWidth <= 768) {
          sb.classList.toggle('open');
          document.getElementById('sidebarOverlay').classList.toggle('open');
        } else {
          sb.classList.toggle('collapsed');
          document.body.classList.toggle('sidebar-collapsed');
        }
      }
      function setActiveBtn(el) {
        document
          .querySelectorAll('.sidebar-btn')
          .forEach((b) => b.classList.remove('active'));
        el.classList.add('active');
        if (window.innerWidth < 768) toggleSidebar();
      }
    </script>
  </body>
</html>
